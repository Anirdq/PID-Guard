services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pidguard
      POSTGRES_PASSWORD: pidpassword
      POSTGRES_DB: pidguarddb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pidguard -d pidguarddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile

    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://pidguard:pidpassword@db:5432/pidguarddb
      - PIDGUARD_API_KEY=PidGuard-Demo-Key
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
