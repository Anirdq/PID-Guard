<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- White background -->
  <rect width="512" height="512" fill="white"/>

  <!-- Left pin -->
  <line x1="3" y1="318" x2="75" y2="318" stroke="#111111" stroke-width="36" stroke-linecap="round"/>
  <!-- Right pin -->
  <line x1="437" y1="318" x2="509" y2="318" stroke="#111111" stroke-width="36" stroke-linecap="round"/>
  <!-- Top stem -->
  <line x1="256" y1="82" x2="256" y2="158" stroke="#111111" stroke-width="34" stroke-linecap="round"/>

  <!-- Top square block — blue fill, black border -->
  <rect x="162" y="145" width="188" height="145" rx="38" ry="38" fill="#2196F3" stroke="#111111" stroke-width="26"/>

  <!-- Main horizontal body — blue fill, black border -->
  <rect x="60" y="258" width="392" height="140" rx="52" ry="52" fill="#2196F3" stroke="#111111" stroke-width="26"/>
</svg>
